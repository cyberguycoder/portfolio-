<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Sumit Pokhrel</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Contact</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects/employee-management-system.html">Projects</a>
        <a href="certificates.html">Certificates</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="contact-form">
      <form id="contactForm">
        <label for="name">Name</label>
        <input id="name" name="name" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">Send Message</button>
      </form>
      <p>Or contact directly at: mbpokharel@gmail.com</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; Sumit Pokhrel</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("u1KRw4nMgJpvaRHuK");
    })();

    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;

      const templateParams = {
        from_name: name,
        from_email: email,
        message: message,
        to_email: 'mbpokharel@gmail.com'
      };

      emailjs.send('service_uf370eo', 'template_xjivdbr', templateParams)
        .then(function(response) {
          alert('Message sent successfully!');
          document.getElementById('contactForm').reset();
        }, function(error) {
          const errText = error && (error.text || error.message || JSON.stringify(error));
          alert('Failed to send message. Check console for details.');
          console.error('EmailJS send error:', errText, error);
        });
    });
  </script>
</body>
</html>
